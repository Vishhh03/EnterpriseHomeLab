name: Infrastructure Code Linter

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-bash:
    name: Lint Bash Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'

  lint-ansible:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Ansible Lint
        run: pip install ansible-lint
        
      - name: Run Ansible Lint
        run: ansible-lint ./ansible/site.yml

  lint-python:
    name: Lint Python Tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Flake8
        run: pip install flake8
        
      - name: Run Flake8
        run: flake8 ./tools/fleet_health.py --max-line-length=120
